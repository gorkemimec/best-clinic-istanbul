server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # /best-clinic-istanbul/ prefix ile gelen istekler (proxy üzerinden)
    location /best-clinic-istanbul/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /best-clinic-istanbul/index.html;
    }

    # Root erişim
    location / {
        try_files $uri $uri/ /index.html;
    }
}
